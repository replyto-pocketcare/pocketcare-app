# PowerSync Sync Rules (bucket_definitions form).
# Paste into the PowerSync Dashboard -> Sync Rules -> Deploy.
#
# Membership-based sharing needs PARAMETER queries (request.user_id() → bucket
# params), then data queries filter by `bucket.x = row.column` (equality only).
# The newer "streams" edition rejects row-vs-parameter subqueries, so we use the
# classic bucket form here.
#
# SCHEMA: all tables live in the `pocketcare` Postgres schema. The PowerSync
# publication must include them:  create publication powersync for tables in schema pocketcare;

bucket_definitions:
  # Global reference / lookup data — same for everyone, read-only.
  global_reference:
    data:
      - SELECT * FROM pocketcare.account_types
      - SELECT * FROM pocketcare.transaction_types
      - SELECT * FROM pocketcare.category_kinds
      - SELECT * FROM pocketcare.periods
      - SELECT * FROM pocketcare.commitment_kinds
      - SELECT * FROM pocketcare.tiers
      - SELECT * FROM pocketcare.rate_modes
      - SELECT * FROM pocketcare.payment_methods
      - SELECT * FROM pocketcare.account_type_payment_methods
      - SELECT *, base_currency || '-' || quote_currency || '-' || as_of AS id FROM pocketcare.exchange_rates

  # A user's own private data (one bucket per user).
  user_data:
    parameters: SELECT request.user_id() AS user_id
    data:
      - SELECT * FROM pocketcare.profiles WHERE id = bucket.user_id
      - SELECT * FROM pocketcare.entitlements WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.accounts WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.transactions WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.transaction_labels WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.transaction_items WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.transaction_audit WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.categories WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.labels WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.credit_card_details WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.budgets WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.budget_categories WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.budget_labels WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.goals WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.goal_allocations WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.recurring_commitments WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.subscriptions WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.loans WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.holdings WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.assistant_threads WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.assistant_messages WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.assistant_memory WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.payments WHERE user_id = bucket.user_id
      # splits — private per-user rows
      - SELECT * FROM pocketcare.expense_postings WHERE user_id = bucket.user_id
      - SELECT * FROM pocketcare.split_invitations WHERE inviter = bucket.user_id
      - SELECT * FROM pocketcare.connections WHERE user_a = bucket.user_id
      - SELECT * FROM pocketcare.connections WHERE user_b = bucket.user_id

  # Splits — the SHARED ledger, one bucket per group the user belongs to.
  group_data:
    parameters: SELECT group_id FROM pocketcare.split_group_members WHERE user_id = request.user_id() AND deleted_at IS NULL
    data:
      - SELECT * FROM pocketcare.split_groups WHERE id = bucket.group_id
      - SELECT * FROM pocketcare.split_group_members WHERE group_id = bucket.group_id
      - SELECT * FROM pocketcare.expenses WHERE group_id = bucket.group_id
      - SELECT * FROM pocketcare.expense_participants WHERE group_id = bucket.group_id
      - SELECT * FROM pocketcare.settlements WHERE group_id = bucket.group_id

  # Display identity (name/email) of everyone we share a group with.
  member_profiles:
    parameters: >
      SELECT DISTINCT m2.user_id AS member_id
      FROM pocketcare.split_group_members m1
      JOIN pocketcare.split_group_members m2 ON m1.group_id = m2.group_id
      WHERE m1.user_id = request.user_id() AND m1.deleted_at IS NULL AND m2.deleted_at IS NULL
    data:
      - SELECT id, display_name, email, created_at, updated_at FROM pocketcare.profiles WHERE id = bucket.member_id

  # Display identity of your connections (accepted invites).
  connection_profiles:
    parameters: >
      SELECT (CASE WHEN user_a = request.user_id() THEN user_b ELSE user_a END) AS conn_id
      FROM pocketcare.connections
      WHERE (user_a = request.user_id() OR user_b = request.user_id()) AND deleted_at IS NULL
    data:
      - SELECT id, display_name, email, created_at, updated_at FROM pocketcare.profiles WHERE id = bucket.conn_id
