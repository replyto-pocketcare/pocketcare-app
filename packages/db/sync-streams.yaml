# PowerSync Sync Streams (recommended, edition 3).
# Paste into the PowerSync Dashboard -> Sync Streams -> Deploy.
# Mirrors RLS: each user (anonymous guests included) syncs only their own rows.
# auto_subscribe: true keeps offline-first "sync everything upfront" behavior.
#
# Streams here must match the client schema in packages/db/src/index.ts (AppSchema).
config:
  edition: 3

streams:
  # All of a user's own data, one subscription (queries share the stream).
  user_data:
    auto_subscribe: true
    queries:
      - SELECT * FROM accounts WHERE user_id = auth.user_id()
      - SELECT * FROM transactions WHERE user_id = auth.user_id()
      - SELECT * FROM transaction_items WHERE user_id = auth.user_id()
      - SELECT * FROM transaction_audit WHERE user_id = auth.user_id()
      - SELECT * FROM categories WHERE user_id = auth.user_id()
      - SELECT * FROM labels WHERE user_id = auth.user_id()
      - SELECT * FROM credit_card_details WHERE user_id = auth.user_id()
      - SELECT * FROM budgets WHERE user_id = auth.user_id()
      - SELECT * FROM goals WHERE user_id = auth.user_id()
      - SELECT * FROM goal_allocations WHERE user_id = auth.user_id()
      - SELECT * FROM recurring_commitments WHERE user_id = auth.user_id()
      - SELECT * FROM subscriptions WHERE user_id = auth.user_id()
      - SELECT * FROM loans WHERE user_id = auth.user_id()
      - SELECT * FROM holdings WHERE user_id = auth.user_id()

  # Global reference data — same rates for everyone, read-only.
  # exchange_rates has a composite key, so synthesize the required text `id`.
  exchange_rates:
    auto_subscribe: true
    query: >
      SELECT *, base_currency || '-' || quote_currency || '-' || as_of AS id
      FROM exchange_rates
