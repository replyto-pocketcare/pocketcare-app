<!--
  PocketCare — Action link (use for: Magic Link, Reset Password, Invite, or a link-style Confirm signup)
  Paste into Supabase → Authentication → Email Templates. Uses {{ .ConfirmationURL }}.
  Edit the heading/paragraph/button text per template (examples in comments).
-->
<!DOCTYPE html>
<html lang="en">
  <body style="margin:0;padding:0;background:#faf6f1;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#2b2723;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#faf6f1;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:#fffdf9;border:1px solid #e7dccd;border-radius:18px;overflow:hidden;">
            <tr>
              <td style="padding:28px 32px 8px;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="width:34px;height:34px;background:#b06a4f;border-radius:9px;text-align:center;vertical-align:middle;color:#fffdf9;font-weight:800;font-size:18px;">P</td>
                    <td style="padding-left:10px;font-size:18px;font-weight:700;letter-spacing:-0.02em;">Pocket<span style="color:#b06a4f;">Care</span></td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 8px;">
                <!-- Reset password: "Reset your password" / Magic link: "Sign in to PocketCare" -->
                <h1 style="margin:0 0 8px;font-size:22px;font-weight:700;letter-spacing:-0.01em;">Confirm your request</h1>
                <p style="margin:0;font-size:15px;line-height:1.6;color:#7c7264;">
                  <!-- Reset: "Click below to choose a new password." / Magic link: "Click below to securely sign in." -->
                  Click the button below to continue. This link expires in 1 hour.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:22px 32px;">
                <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                  <tr>
                    <td align="center">
                      <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#b06a4f;color:#ffffff;text-decoration:none;font-weight:600;font-size:15px;padding:13px 26px;border-radius:999px;">Continue</a>
                    </td>
                  </tr>
                </table>
                <p style="margin:16px 0 0;font-size:12px;line-height:1.6;color:#a89b8a;text-align:center;word-break:break-all;">
                  Or paste this link into your browser:<br />{{ .ConfirmationURL }}
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:8px 32px 28px;border-top:1px solid #e7dccd;">
                <p style="margin:16px 0 0;font-size:12px;line-height:1.6;color:#a89b8a;">
                  If you didn’t request this, you can ignore this email. PocketCare — your calm, offline-first money companion.
                </p>
              </td>
            </tr>
          </table>
          <p style="max-width:480px;margin:16px auto 0;font-size:11px;color:#a89b8a;text-align:center;">© PocketCare</p>
        </td>
      </tr>
    </table>
  </body>
</html>
